services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8085}:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - backend-data:/app/src/api
    restart: always

volumes:
  backend-data:
